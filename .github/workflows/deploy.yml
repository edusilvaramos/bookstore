name: Deploy to VPS (build on server)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            cd /var/www/bookstore

            echo "==> Pull latest code"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Install PHP deps"
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "==> Build front assets (Encore) on VPS"
            npm ci
            npm run build

            echo "==> Database migrations"
            APP_ENV=prod APP_DEBUG=0 php bin/console doctrine:migrations:migrate --no-interaction

            echo "==> Cache clear/warmup"
            APP_ENV=prod APP_DEBUG=0 php bin/console cache:clear
            APP_ENV=prod APP_DEBUG=0 php bin/console cache:warmup

            echo "==> Reload PHP-FPM (ignore if service name differs)"
            sudo systemctl reload php8.4-fpm || sudo systemctl reload php-fpm || true

            echo "Deploy finished"