name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /var/www/bookstore

            if [ -z "${{ secrets.APP_SECRET }}" ]; then
              echo "APP_SECRET não configurado nos GitHub Secrets"
              exit 1
            fi

            git fetch origin main
            git reset --hard origin/main

            tmpfile=$(mktemp)
            if [ -f .env.local ]; then
              grep -v '^APP_SECRET=' .env.local > "$tmpfile" || true
            fi
            printf "APP_SECRET=%s\n" '${{ secrets.APP_SECRET }}' >> "$tmpfile"
            mv "$tmpfile" .env.local

            composer install --no-dev --optimize-autoloader --no-interaction

            APP_ENV=prod APP_DEBUG=0 php bin/console cache:clear
            APP_ENV=prod APP_DEBUG=0 php bin/console cache:warmup
            APP_ENV=prod APP_DEBUG=0 php bin/console asset-map:compile