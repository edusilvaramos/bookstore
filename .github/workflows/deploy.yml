name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_SECRET: ${{ secrets.APP_SECRET }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_SECRET
          script: |
            set -e
            cd /var/www/bookstore

            git fetch origin main
            git reset --hard origin/main

            existing_secret=""
            if [ -f .env.local ]; then
              existing_secret=$(grep '^APP_SECRET=' .env.local | head -n1 | cut -d '=' -f2- || true)
            fi

            if [ -n "$APP_SECRET" ]; then
              final_secret="$APP_SECRET"
            elif [ -n "$existing_secret" ]; then
              final_secret="$existing_secret"
              echo "APP_SECRET ausente nos GitHub Secrets; usando valor existente de .env.local"
            else
              final_secret=$(openssl rand -hex 32)
              echo "APP_SECRET ausente; gerado novo segredo para primeira configuração"
            fi

            tmpfile=$(mktemp)
            if [ -f .env.local ]; then
              grep -v '^APP_SECRET=' .env.local > "$tmpfile" || true
            fi
            printf "APP_SECRET=%s\n" "$final_secret" >> "$tmpfile"
            mv "$tmpfile" .env.local

            # Garantir que o PHP-FPM (www-data) consiga ler o arquivo
            chgrp www-data .env.local
            chmod 640 .env.local
            
            composer install --no-dev --optimize-autoloader --no-interaction

            APP_ENV=prod APP_DEBUG=0 php bin/console doctrine:schema:validate --skip-sync

            APP_ENV=prod APP_DEBUG=0 php bin/console doctrine:migrations:migrate --no-interaction

            APP_ENV=prod APP_DEBUG=0 php bin/console cache:clear
            APP_ENV=prod APP_DEBUG=0 php bin/console cache:warmup
            APP_ENV=prod APP_DEBUG=0 php bin/console asset-map:compile

            sudo systemctl reload php8.4-fpm